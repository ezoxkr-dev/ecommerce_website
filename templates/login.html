{% extends "base.html" %}

{% block title %}Login - Ezox Bypass{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container glass-panel">
        <div class="section-header">
            <h2>Welcome <span class="text-gradient">Back</span></h2>
            <p>Login to your account</p>
        </div>
        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required class="form-input">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="form-input">
            </div>
            <div class="form-group" style="text-align: right; margin-top: 5px; margin-bottom: 20px;">
                <a href="{{ url_for('forgot_password') }}" style="color: var(--purple-light); font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>
            </div>
            
            <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" style="margin-bottom: 15px; display: flex; justify-content: center;"></div>

            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <p class="auth-redirect">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
</section>
{% endblock %}
