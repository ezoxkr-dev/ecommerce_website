{% extends "base.html" %}

{% block title %}Forgot Password - Ezox Bypass{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container glass-panel">
        <div class="section-header text-center" style="margin-bottom: 30px;">
            <h2 style="font-size: 2rem;">Reset <span class="text-gradient">Password</span></h2>
            <p>Enter your email to receive a reset link</p>
        </div>
        
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your registered email">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
            
            <div class="auth-redirect mt-4 text-center">
                <p>Remembered your password? <a href="{{ url_for('login') }}">Login here</a></p>
            </div>
        </form>
    </div>
</section>
{% endblock %}
