{% extends "base.html" %}

{% block title %}Register - Ezox Bypass{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container glass-panel">
        <div class="section-header">
            <h2>Create <span class="text-gradient">Account</span></h2>
            <p>Join the Ezox community</p>
        </div>
        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required class="form-input">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required class="form-input">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="form-input">
            </div>
            <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" style="margin-bottom: 15px; display: flex; justify-content: center;"></div>

            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
        <p class="auth-redirect">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</section>
{% endblock %}
